<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with [Your Name] for collaboration or job opportunities.">
    <title>Contact | [Your Name] Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header role="banner">
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content" role="main">
        <article>
            <h1>Contact Me</h1>
            <p>Feel free to reach out using the form below. I typically respond within 24 hours.</p>

            <form action="/submit-form" method="POST" aria-labelledby="form-heading">
                <h2 id="form-heading" class="sr-only">Contact Form</h2>

                <div class="form-group">
                    <label for="name">Full Name <span aria-hidden="true" class="required-indicator">*</span></label>
                    <input type="text" id="name" name="name" required aria-required="true" placeholder="Jane Doe"
                        autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span aria-hidden="true"
                            class="required-indicator">*</span></label>
                    <input type="email" id="email" name="email" required aria-required="true"
                        placeholder="jane.doe@example.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Inquiry about freelance work">
                </div>

                <div class="form-group">
                    <label for="message">Message <span aria-hidden="true" class="required-indicator">*</span></label>
                    <textarea id="message" name="message" rows="5" required aria-required="true"
                        placeholder="Your message here..."></textarea>
                </div>

                <button type="submit" aria-label="Send Message">Send Message</button>
            </form>
        </article>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2026 [ Quiet Generator ]. All rights reserved.</p>
    </footer>
</body>

</html>
